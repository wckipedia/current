name: Refresh briefing

on:
  schedule:
    - cron: "13 5 * * *"
      timezone: "Asia/Singapore"
    - cron: "17 6 * * *"
      timezone: "Asia/Singapore"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: current-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run refresh
      - run: npm test
      - run: npm run build
      - name: Commit updated briefing
        run: |
          git config user.name "current-bot"
          git config user.email "current-bot@users.noreply.github.com"
          git add public/data
          git diff --cached --quiet || git commit -m "content: refresh daily briefing"
          git push
